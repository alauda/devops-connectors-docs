        Surveyed both analogous Tasks in connectors-extensions: Harbor
        `harbor-connector-automatic-creation` uses `robotAccountDuration`
        (days, passed as-is — Harbor API natively accepts duration);
        GitLab `gitlab-connector-automatic-creation` uses `tokenDuration`
        (days) + `compute_token_expiry()` bash helper that derives
        `today UTC + N days` at runtime, because the GitLab GAT API only
        accepts `expires_at=YYYY-MM-DD`. SonarQube `user_tokens/generate`
        is API-shaped like GitLab (POC verified accepts only
        `expirationDate=YYYY-MM-DD` on both 25.1 and 8.9.2), so adopted
        the GitLab pattern verbatim: parameter renamed
        `tokenExpiry` → `tokenDuration` (string days, default `"30"`);
        `ensure-token.sh` gains `compute_token_expiry()` (`date -u -d
        "@$((now + N * 86400))" +%Y-%m-%d` with busybox `-r` fallback);
        identity-changing inputs become {`tokenName`, `tokenDuration`}.
        Cron Task re-runs now auto-extend the expiry; absolute date never
        enters Pod spec / TaskRun YAML / process args — also a security
        improvement (credential-lifetime info-leak reduction). Outcome
        rework (not pivot — single-parameter targeted correction); does
